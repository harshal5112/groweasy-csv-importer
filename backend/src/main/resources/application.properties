spring.application.name=csv-importer

# Server
server.port=${PORT:8080}
server.tomcat.max-swallow-size=10MB

# Multipart upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# Gemini AI configuration (read from environment variables - never hardcode keys)
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.model=${GEMINI_MODEL:gemini-2.5-flash}
gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta/models

# Batch processing
app.batch.size=${BATCH_SIZE:25}
app.batch.max-retries=${MAX_RETRIES:3}
app.batch.retry-backoff-ms=${RETRY_BACKOFF_MS:1500}

# CORS - set this to your deployed Vercel URL in production
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# Logging
logging.level.com.groweasy.csvimporter=INFO
logging.level.org.springframework.web=INFO
